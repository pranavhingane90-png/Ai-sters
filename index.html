<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0"/>

  <title>AI-ster</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:linear-gradient(135deg,#0f172a,#111827);
      color:white;
      min-height:100vh;
      padding:30px;
    }

    h1{
      text-align:center;
      font-size:60px;
      margin-bottom:10px;
      background:linear-gradient(45deg,#38bdf8,#818cf8);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .subtitle{
      text-align:center;
      color:#cbd5e1;
      margin-bottom:40px;
      font-size:18px;
    }

    .container{
      max-width:1200px;
      margin:auto;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:25px;
      padding:30px;
      backdrop-filter:blur(15px);
      box-shadow:0 0 40px rgba(0,0,0,0.4);
    }

    textarea{
      width:100%;
      height:120px;
      border:none;
      border-radius:18px;
      padding:18px;
      background:rgba(255,255,255,0.08);
      color:white;
      font-size:16px;
      outline:none;
      resize:none;
      margin-top:15px;
    }

    textarea::placeholder{
      color:#94a3b8;
    }

    input[type="file"]{
      margin-top:20px;
      color:white;
    }

    .btn{
      padding:14px 30px;
      border:none;
      border-radius:15px;
      cursor:pointer;
      font-size:16px;
      font-weight:bold;
      transition:0.3s;
      margin-top:20px;
    }

    .generate-btn{
      background:linear-gradient(45deg,#00c6ff,#0072ff);
      color:white;
    }

    .generate-btn:hover{
      transform:scale(1.05);
      box-shadow:0 0 20px #0072ff;
    }

    .gallery{
      display:grid;
      grid-template-columns:
      repeat(auto-fit,minmax(300px,1fr));
      gap:25px;
      margin-top:40px;
    }

    .card{
      background:rgba(255,255,255,0.06);
      border-radius:22px;
      overflow:hidden;
      position:relative;
      transition:0.3s;
      border:1px solid rgba(255,255,255,0.08);
    }

    .card:hover{
      transform:translateY(-8px);
      box-shadow:0 0 25px rgba(0,0,0,0.5);
    }

    .card img{
      width:100%;
      height:350px;
      object-fit:cover;
      display:block;
    }

    .watermark{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      font-size:32px;
      font-weight:bold;
      color:rgba(255,255,255,0.8);
      text-shadow:0 0 10px black;
      pointer-events:none;
    }

    .download-btn{
      width:100%;
      background:
      linear-gradient(45deg,#f59e0b,#f97316);
      color:white;
    }

    .download-btn:hover{
      box-shadow:0 0 20px orange;
    }

    .loading{
      text-align:center;
      margin-top:30px;
      font-size:24px;
      color:#38bdf8;
      font-weight:bold;
    }

    .payment-modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.85);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:999;
    }

    .payment-box{
      width:400px;
      background:#111827;
      border-radius:25px;
      padding:30px;
      text-align:center;
      animation:popup 0.3s ease;
    }

    @keyframes popup{

      from{
        transform:scale(0.7);
        opacity:0;
      }

      to{
        transform:scale(1);
        opacity:1;
      }

    }

    .payment-box img{
      width:100%;
      border-radius:20px;
      margin-top:15px;
    }

    .verify-btn{
      background:limegreen;
      color:white;
      width:100%;
    }

    .close-btn{
      background:crimson;
      color:white;
      width:100%;
    }

    .hidden{
      display:none;
    }

    .success{
      color:lime;
      margin-top:15px;
      font-weight:bold;
    }

    .admin-btn{
      position:fixed;
      bottom:20px;
      right:20px;
      background:#111;
      color:white;
      padding:12px 20px;
      border-radius:50px;
      cursor:pointer;
      opacity:0.25;
      transition:0.3s;
      user-select:none;
    }

    .admin-btn:hover{
      opacity:1;
    }

  </style>

</head>

<body>

  <h1>AI-ster</h1>

  <p class="subtitle">
    Generate Stunning AI Images Instantly
  </p>

  <div class="container">

    <h2>Describe Your Image</h2>

    <textarea
      id="prompt"
      placeholder="Example: Lord Ganesha made from clouds in sky..."
    ></textarea>

    <input type="file" multiple>

    <br>

    <button
      class="btn generate-btn"
      onclick="generateImages()"
    >
      Generate AI Images
    </button>

    <div id="loading" class="loading"></div>

    <div class="gallery" id="gallery"></div>

  </div>

  <!-- PAYMENT MODAL -->

  <div class="payment-modal" id="paymentModal">

    <div class="payment-box">

      <h2>Unlock HD Download</h2>

      <p style="margin-top:10px;color:#cbd5e1;">

        Pay ₹100 to Download HD Image

      </p>

      <!-- YOUR QR IMAGE -->
      <img src="scanner.jpeg" alt="Scanner">

      <p style="margin-top:15px;">

        UPI ID:
        pranavhingane0-1@oksbi

      </p>

      <button
        class="btn verify-btn"
        onclick="showProofSection()"
      >
        I Have Paid
      </button>

      <div
        id="proofSection"
        class="hidden"
      >

        <input
          type="file"
          id="paymentScreenshot"
        >

        <button
          class="btn verify-btn"
          onclick="verifyPayment()"
        >
          Verify Payment
        </button>

        <p
          id="verifyMessage"
          class="success"
        ></p>

      </div>

      <button
        class="btn close-btn"
        onclick="closePayment()"
      >
        Close
      </button>

    </div>

  </div>

  <!-- ADMIN -->

  <div
    class="admin-btn"
    onclick="adminAccess()"
  >
    Admin
  </div>

  <script>

    const ADMIN_KEY = "mepranav";

    let selectedDownload = null;

    async function generateImages(){

      let prompt =
      document
      .getElementById("prompt")
      .value
      .trim();

      if(prompt === ""){

        alert(
          "Please enter image description"
        );

        return;
      }

      let gallery =
      document.getElementById("gallery");

      let loading =
      document.getElementById("loading");

      gallery.innerHTML = "";

      loading.innerHTML =
      "Generating AI Images...";

      const styles = [

        "ultra realistic cinematic 4k",

        "high quality fantasy artwork",

        "detailed digital art masterpiece"

      ];

      for(let i = 0; i < 3; i++){

        let finalPrompt =

        `${prompt},
        ${styles[i]},
        highly detailed,
        trending on artstation`;

        let imageUrl =

        `https://image.pollinations.ai/prompt/${
          encodeURIComponent(finalPrompt)
        }?width=1024&height=1024&seed=${
          Math.floor(Math.random()*100000)
        }`;

        let card =
        document.createElement("div");

        card.className = "card";

        card.innerHTML = `

          <img
            src="${imageUrl}"
            alt="AI Image"
            loading="lazy"
            onerror="imageError(this)"
          >

          <div class="watermark">
            AI-ster
          </div>

          <button
            class="btn download-btn"
            onclick="openPayment('${imageUrl}')"
          >
            Download HD
          </button>

        `;

        gallery.appendChild(card);

      }

      loading.innerHTML = "";

    }

    function imageError(img){

      img.src =
      "https://picsum.photos/600/600";

    }

    function openPayment(image){

      let isAdmin =
      localStorage.getItem("adminMode");

      if(isAdmin === "true"){

        downloadImage(image);

        return;
      }

      selectedDownload = image;

      document
      .getElementById("paymentModal")
      .style.display = "flex";

    }

    function closePayment(){

      document
      .getElementById("paymentModal")
      .style.display = "none";

    }

    function showProofSection(){

      document
      .getElementById("proofSection")
      .classList.remove("hidden");

    }

    function verifyPayment(){

      let file =

      document
      .getElementById("paymentScreenshot")
      .files[0];

      if(!file){

        alert(
          "Please upload payment screenshot"
        );

        return;
      }

      document
      .getElementById("verifyMessage")
      .innerHTML =

      "Payment screenshot uploaded successfully";

      setTimeout(() => {

        alert("Demo Payment Approved");

        downloadImage(selectedDownload);

      },2000);

    }

    function downloadImage(image){

      fetch(image)

      .then(response => response.blob())

      .then(blob => {

        let blobUrl =
        URL.createObjectURL(blob);

        let a =
        document.createElement("a");

        a.href = blobUrl;

        a.download =
        "AI-ster-image.jpg";

        document.body.appendChild(a);

        a.click();

        document.body.removeChild(a);

        URL.revokeObjectURL(blobUrl);

      });

      closePayment();

    }

    function adminAccess(){

      let key =
      prompt("Enter Admin Key");

      if(key === ADMIN_KEY){

        localStorage.setItem(
          "adminMode",
          "true"
        );

        alert(
          "Admin Mode Activated"
        );

      } else {

        alert(
          "Wrong Admin Key"
        );

      }

    }

  </script>

</body>

</html>
